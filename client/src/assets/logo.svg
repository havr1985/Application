<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
    <!-- Calendar icon -->
    <rect x="2" y="6" width="28" height="26" rx="4" stroke="#6366f1" stroke-width="2.5" fill="none"/>
    <line x1="9" y1="2" x2="9" y2="10" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="23" y1="2" x2="23" y2="10" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="15" x2="30" y2="15" stroke="#6366f1" stroke-width="2" />
    <!-- Check mark inside calendar -->
    <polyline points="10,23 15,28 23,20" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Text -->
    <text x="38" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#111827">Event</text>
    <text x="97" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1">Hub</text>
</svg>