services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-event_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  server-migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      sh -c "npx typeorm migration:run -d dist/data-source.js && node dist/seed/seed.js"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-event_management}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${SERVER_PORT:-4000}:4000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-event_management}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super-secret-jwt-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      SERVER_PORT: 4000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      server-migrate:
        condition: service_completed_successfully

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT:-3000}:80'
    depends_on:
      - server

volumes:
  postgres_data: